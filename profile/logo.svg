<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="acc" x1="120" y1="380" x2="420" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111826"/><stop offset="1" stop-color="#080B12"/>
    </linearGradient>
