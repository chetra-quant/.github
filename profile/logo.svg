  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#1E293B" stroke-width="2"/>

  <!-- Q-ring, centered (256,256) r120, with a GATE GAP at lower-right (18deg..60deg open) -->
